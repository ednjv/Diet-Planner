.meal-header{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.meal-icon{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.meal-title{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.meal-time{font-size:11px;color:var(--color-text-secondary);margin-left:auto}
.tupper-tag{font-size:10px;background:#FAEEDA;color:#633806;padding:1px 6px;border-radius:4px;margin-left:6px}

.food-row:last-child{border-bottom:none}
.food-name{font-size:13px;color:var(--color-text-primary)}
.food-qty{font-size:11px;color:var(--color-text-secondary);margin-left:6px;white-space:nowrap}
.mb{font-size:10px;padding:1px 4px;border-radius:3px;margin-left:3px}

.shop-cat{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.05em;padding:12px 0 5px;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:4px}
table.shop{width:100%;border-collapse:collapse;font-size:12px}
table.shop th{text-align:left;padding:6px 8px;font-weight:500;font-size:11px;color:var(--color-text-secondary);border-bottom:0.5px solid var(--color-border-tertiary)}
table.shop td{padding:6px 8px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary);vertical-align:top}
table.shop tr:last-child td{border-bottom:none}
table.shop td.brand{color:var(--color-text-secondary);font-size:11px}
table.shop td.qty{font-weight:500;white-space:nowrap}
table.shop td.note-td{color:var(--color-text-secondary);font-size:11px}
.tip-block{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px 14px;margin-bottom:10px}
.tip-title{font-size:13px;font-weight:500;margin-bottom:7px;color:var(--color-text-primary)}
.tip-row{font-size:13px;color:var(--color-text-primary);padding:3px 0}
.tip-sub{font-size:12px;color:var(--color-text-secondary)}
.pane{display:none}.pane.active{display:block}
.macro-row{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:1rem}
.mc2{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:7px;text-align:center}
.mc2 .v{font-size:14px;font-weight:500;color:var(--color-text-primary)}

let activeDay=0;

function renderDays(){
  document.getElementById('dayBtns').innerHTML=days.map((d,i)=>{
    let badges='';
    if(d.sport==="padel") badges+=`<span class="badge b-padel">padel</span>`;
    if(d.sport==="fútbol") badges+=`<span class="badge b-fut">fútbol</span>`;
    if(d.ofic) badges+=`<span class="badge b-ofic">oficina</span>`;
    return `<button class="day-btn${i===activeDay?' active':''}" onclick="selDay(${i})">${d.name}${badges}</button>`;
  }).join('');
}

function renderMeals(){
  const d=days[activeDay];
  const mb={p:'mp',c:'mc',f:'mf',l:'ml',fr:'mfr'};
  const ml={p:'P',c:'C',f:'Ac',l:'L',fr:'Fr'};
  let h='';
  d.meals.forEach(m=>{
    const tup=m.tupper?`<span class="tupper-tag">tupper</span>`:'';
    h+=`<div class="meal-block"><div class="meal-header"><div class="meal-icon" style="background:${m.bg}">${m.icon}</div><span class="meal-title">${m.type}${tup}</span><span class="meal-time">${m.time}</span></div>`;
    m.foods.forEach(f=>{
      const b=f.b?`<span class="mb ${mb[f.b]}">${ml[f.b]}</span>`:'';
      h+=`<div class="food-row"><span class="food-name">${f.n}${b}</span><span class="food-qty">${f.a||''}</span></div>`;
    });
    if(m.note) h+=`<div class="note">${m.note}</div>`;
    h+='</div>';
  });
  document.getElementById('mealView').innerHTML=h;
}

function renderShop(){
  let h='';
  shopData.forEach(cat=>{
    h+=`<div class="shop-cat">${cat.cat}</div><table class="shop"><thead><tr><th style="width:28%">Producto</th><th style="width:22%">Marca Chile</th><th style="width:12%">Cantidad</th><th>Notas</th></tr></thead><tbody>`;
    cat.rows.forEach(r=>{
      h+=`<tr><td>${r.p}</td><td class="brand">${r.br}</td><td class="qty">${r.q}</td><td class="note-td">${r.n}</td></tr>`;
    });
    h+=`</tbody></table>`;
  });
  document.getElementById('shopView').innerHTML=h;
}

function renderOfic(){
  let h='';
  oficTips.forEach(sec=>{
    h+=`<div class="tip-block"><div class="tip-title">${sec.title}</div>`;
    sec.items.forEach(it=>{
      h+=`<div class="tip-row">— ${it.t}<br><span class="tip-sub">${it.s}</span></div>`;
    });
    h+='</div>';
  });
  document.getElementById('oficView').innerHTML=h;
}

window.selDay=function(i){activeDay=i;renderDays();renderMeals();}
window.showTab=function(t){
  document.querySelectorAll('.tab').forEach((b,i)=>{b.classList.toggle('active',['plan','shop','ofic'][i]===t)});
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('pane-'+t).classList.add('active');
}

renderDays();renderMeals();renderShop();renderOfic();
</script>
